{% extends "base.html" %}
{% block title %}Change Password — {{ site.name }}{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Change password</h2>
    <p class="auth-sub">Pick something secure you'll remember.</p>
    <form method="POST">
      <div class="field">
        <label>Current password</label>
        <input type="password" name="current" required autofocus/>
      </div>
      <div class="field">
        <label>New password</label>
        <input type="password" name="new_password" placeholder="Min 8 characters" required/>
      </div>
      <div class="field">
        <label>Confirm new password</label>
        <input type="password" name="confirm" required/>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;margin-top:0.5rem;">Update password →</button>
    </form>
    <div class="auth-links"><a href="/members">← Back to member space</a></div>
  </div>
</div>
{% endblock %}
