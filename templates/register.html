{% extends "base.html" %}
{% block title %}Apply — {{ site.name }}{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="36" height="30" viewBox="0 0 60 44" fill="none">
        <polygon points="20,0 30,6 20,12 10,6" fill="none" stroke="#8BEEE0" stroke-width="2"/>
        <polygon points="20,12 30,6 30,18 20,24" fill="none" stroke="#8BEEE0" stroke-width="2"/>
        <polygon points="20,12 10,6 10,18 20,24" fill="none" stroke="#8BEEE0" stroke-width="2"/>
        <polygon points="10,24 20,18 20,30 10,36" fill="none" stroke="#8BEEE0" stroke-width="2"/>
        <polygon points="20,30 20,18 30,24 30,36" fill="none" stroke="#8BEEE0" stroke-width="2"/>
        <polygon points="10,24 0,18 0,30 10,36" fill="none" stroke="#8BEEE0" stroke-width="2"/>
        <polygon points="10,18 20,12 10,6 0,12" fill="none" stroke="#8BEEE0" stroke-width="2"/>
        <polygon points="30,24 40,18 40,30 30,36" fill="none" stroke="#8BEEE0" stroke-width="2"/>
        <polygon points="40,30 40,18 50,24 50,36" fill="none" stroke="#8BEEE0" stroke-width="2"/>
        <polygon points="30,24 20,18 30,12 40,18" fill="none" stroke="#8BEEE0" stroke-width="2"/>
      </svg>
    </div>
    <h2>Create your account</h2>
    <p class="auth-sub">Already applied via Google Form? Create your login here.</p>
    <form method="POST">
      <div class="field">
        <label>Full name</label>
        <input type="text" name="name" placeholder="Your name" required autofocus/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 8 characters" required/>
      </div>
      <div class="field">
        <label>Confirm password</label>
        <input type="password" name="confirm" placeholder="Repeat password" required/>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;margin-top:0.5rem;">Submit application →</button>
    </form>
    <div class="auth-links">
      <span>Already have an account?</span>
      <a href="/login">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
